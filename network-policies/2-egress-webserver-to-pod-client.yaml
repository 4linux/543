---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: 2-egress-pod-client-to-webserver
  namespace: developer
spec:
  podSelector:
    matchLabels:
      curso: rancher
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: php
      ports:
        - protocol: TCP
          port: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: 5-allow-public-http-to-webserver
  namespace: developer
spec:
  podSelector:
    matchLabels:
      app: php
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - podSelector: {}
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
